<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artistry · UI 데모</title>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; overflow: hidden; }
    #aw-wrap { position: relative; width: 100%; overflow: hidden; }
    #aw-frame { border: 0; display: block; transform-origin: top left; }
    #aw-note {
      position: fixed; bottom: 16px; right: 16px; z-index: 99999;
      background: rgba(15,23,42,.9); color: #fff; font-size: 12px;
      padding: 8px 12px; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }
  </style>
</head>
<body>
  <div id="aw-note">UI/UX 데모 · 실제 데이터·기능은 동작하지 않습니다</div>
  <div id="aw-wrap">
    <iframe id="aw-frame" src="page.html" title="Artistry"></iframe>
  </div>

  <script>
    // 원본은 약 2560px 뷰포트(=1920 모니터 75% 줌) 기준 설계.
    // iframe에 그 폭을 그대로 주고, 화면 크기에 맞게 통째로 스케일 → 레이아웃은 원본 그대로, 크기만 맞춤.
    var DESIGN_W = 2560;
    var frame = document.getElementById('aw-frame');
    var wrap = document.getElementById('aw-wrap');

    function fit() {
      var avail = document.documentElement.clientWidth;
      var scale = avail / DESIGN_W;
      frame.style.width = DESIGN_W + 'px';
      frame.style.height = Math.ceil(window.innerHeight / scale) + 'px';
      frame.style.transform = 'scale(' + scale + ')';
      wrap.style.height = window.innerHeight + 'px';
    }

    frame.addEventListener('load', fit);
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
