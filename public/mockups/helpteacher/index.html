<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>헬프티처 관리자 · UI 데모</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { maxWidth: { 300: '75rem' } } },
    }
  </script>
  <style>
    [hidden] { display: none !important; }
    /* ===== 반응형 보정: 좁은 화면에서만 가로 스크롤 허용 (데스크톱 무변경) ===== */
    @media (max-width: 1000px) {
      #app > header { overflow-x: auto; }
      #view-orglist .bg-white { overflow-x: auto; }
      #view-orglist table, #view-boothlist table { min-width: 760px; }
      #view-boothlist .max-w-300 { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="fixed bottom-4 right-4 z-[9999] bg-slate-900/90 text-white text-xs px-3 py-2 rounded-lg shadow-lg">
    UI/UX 데모 · 실제 데이터·기능은 동작하지 않습니다
  </div>

  <!-- ============ 로그인 ((auth)/login) ============ -->
  <section id="login" class="min-h-screen flex items-center justify-center bg-slate-100">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-6">
        <div class="text-center mb-6">
          <img src="helpteacherLogo.png" alt="logo image" class="h-32 mx-auto object-contain" />
          <p class="text-base text-slate-500 mt-3">관리자 페이지에 로그인 하세요.</p>
        </div>
        <form class="flex flex-col gap-5" onsubmit="enterApp(event)">
          <div>
            <label for="id" class="block text-base font-medium text-slate-700 mb-2">아이디</label>
            <input type="text" id="id" value="admin" placeholder="아이디 입력"
              class="w-full border border-slate-200 rounded-md py-2.5 px-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label for="password" class="block text-base font-medium text-slate-700 mb-2">비밀번호</label>
            <input type="password" id="password" value="000000" placeholder="비밀번호 입력"
              class="w-full border border-slate-200 rounded-md py-2.5 px-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <button type="submit"
            class="w-full py-2.5 px-4 text-base font-medium bg-blue-500 hover:bg-blue-600 text-white rounded-md transition-colors mt-1">login</button>
        </form>
      </div>
    </div>
  </section>

  <!-- ============ 관리자 ((admin)/layout) ============ -->
  <div id="app" hidden class="min-h-screen flex flex-col bg-slate-50">

    <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 shdow-sm">
      <div class="h-9 mr-8">
        <a href="#" onclick="showView('dashboard');return false">
          <img src="helpteacherLogo.png" alt="로고 이미지" class="block object-contain h-full" />
        </a>
      </div>

      <div class="flex gap-x-1 mr-auto">
        <a href="#" onclick="showView('dashboard');return false">
          <button class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover: bg-slate-100 rounded-md transition-colors">대시보드</button>
        </a>

        <!-- 기관 관리 -->
        <div class="relative dd">
          <button onclick="toggleDd('org')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-md transition-colors flex items-center gap-1">
            기관 관리 <span class="text-xs text-slate-400" data-arrow="org">▼</span>
          </button>
          <div data-menu="org" hidden class="absolute top-full left-0 mt-1 bg-white border border-slate-200 rouded-md shadow-lg min-w-max z-50">
            <a href="#" onclick="showView('dashboard');return false" class="block px-4 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors first:rounded-t-md last:rounded-b-md">기관 코드 발급</a>
            <a href="#" onclick="showView('orglist');return false" class="block px-4 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors first:rounded-t-md last:rounded-b-md">기관 목록</a>
          </div>
        </div>

        <!-- 부스 관리 -->
        <div class="relative dd">
          <button onclick="toggleDd('booth')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-md transition-colors flex items-center gap-1">
            부스 관리 <span class="text-xs text-slate-400" data-arrow="booth">▼</span>
          </button>
          <div data-menu="booth" hidden class="absolute top-full left-0 mt-1 bg-white border border-slate-200 rouded-md shadow-lg min-w-max z-50">
            <a href="#" onclick="showView('dashboard');return false" class="block px-4 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors first:rounded-t-md last:rounded-b-md">부스 코드 발급</a>
            <a href="#" onclick="showView('boothlist');return false" class="block px-4 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors first:rounded-t-md last:rounded-b-md">부스 목록</a>
          </div>
        </div>

        <!-- 장비 관리 -->
        <div class="relative dd">
          <button onclick="toggleDd('devices')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-md transition-colors flex items-center gap-1">
            장비 관리 <span class="text-xs text-slate-400" data-arrow="devices">▼</span>
          </button>
          <div data-menu="devices" hidden class="absolute top-full left-0 mt-1 bg-white border border-slate-200 rouded-md shadow-lg min-w-max z-50">
            <a href="#" onclick="showView('dashboard');return false" class="block px-4 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors first:rounded-t-md last:rounded-b-md">장비 등록</a>
            <a href="#" onclick="showView('dashboard');return false" class="block px-4 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors first:rounded-t-md last:rounded-b-md">장비 목록</a>
          </div>
        </div>

        <!-- 상담 관리 -->
        <div class="relative dd">
          <button onclick="toggleDd('analytics')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-md transition-colors flex items-center gap-1">
            상담 관리 <span class="text-xs text-slate-400" data-arrow="analytics">▼</span>
          </button>
          <div data-menu="analytics" hidden class="absolute top-full left-0 mt-1 bg-white border border-slate-200 rouded-md shadow-lg min-w-max z-50">
            <a href="#" onclick="showView('dashboard');return false" class="block px-4 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors first:rounded-t-md last:rounded-b-md">통계 정보 조회</a>
          </div>
        </div>
      </div>

      <div class="ml-auto pr-10">
        <a href="#" onclick="logout();return false">
          <button class="px-4 py-2 rext-sm font-medium text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors">로그아웃</button>
        </a>
      </div>
    </header>

    <main class="flex-1">
      <!-- 대시보드 ((admin)/test) -->
      <section id="view-dashboard" class="p-8">
        <div class="mb-6">
          <h1 class="text-xl font-semibold text-slate-800">대시보드</h1>
          <p class="text-sm text-slate-500 mt-1">관리자 페이지 대시보드입니다.</p>
        </div>
      </section>

      <!-- 기관 목록 ((admin)/(org)/orglist) -->
      <section id="view-orglist" hidden class="p-8">
        <div class="mb-6">
          <h1 class="text-2xl font-semibold text-slate-800">기관 목록</h1>
          <p class="text-base text-slate-500 mt-1">등록된 기관을 조회합니다.</p>
        </div>
        <div class="bg-white rounded-lg border border-slate-200 shdow-sm">
          <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
            <div class="flex items-center gap-2 flex-wrap">
              <input type="text" id="oSearch" oninput="renderOrg()" placeholder="기관명 또는 코드 검색"
                class="border border-slate-200 rounded-md px-3 py-2 text-base bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent w-56" />
              <select id="oRegion" onchange="oPage=1;renderOrg()" class="border border-slate-200 rounded-md px-3 py-2 text-base bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
              <select id="oAccount" onchange="oPage=1;renderOrg()" class="border border-slate-200 rounded-md px-3 py-2 text-base bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">계정 유무</option>
                <option value="true">계정 있음</option>
                <option value="false">계정 없음</option>
              </select>
              <button onclick="resetOrg()" class="text-base text-slate-400 hover:text-slate-600 underline underline-offset-2">초기화</button>
            </div>
            <select id="oSize" onchange="oPage=1;renderOrg()" class="border border-slate-200 rounded-md px-3 py-2 text-base bg-white focus:outline-none">
              <option value="10">10개씩</option>
              <option value="20">20개씩</option>
              <option value="50">50개씩</option>
            </select>
          </div>
          <table class="w-full">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-200">
                <th class="text-left px-5 py-3 text-sm font-semibold text-slate-500">기관 코드</th>
                <th class="text-left px-5 py-3 text-sm font-semibold text-slate-500">기관명</th>
                <th class="text-left px-5 py-3 text-sm font-semibold text-slate-500 cursor-pointer select-none hover:text-slate-700" onclick="oToggleSort()" id="oSortTh">둥록 일자 ▼</th>
                <th class="text-left px-5 py-3 text-sm font-semibold text-slate-500">운영 부스</th>
                <th class="text-left px-5 py-3 text-sm font-semibold text-slate-500">계정</th>
                <th class="text-left px-5 py-3 text-sm font-semibold text-slate-500">지역</th>
              </tr>
            </thead>
            <tbody id="oBody" class="divide-y divide-slate-100"></tbody>
          </table>
          <div class="flex items-center justify-between px-5 py-3 border-t bordere-slate-100">
            <p id="oCount" class="text-sm text-slate-400"></p>
            <div id="oPager" class="flex items-center gap-1"></div>
          </div>
        </div>
      </section>

      <!-- 부스 목록 ((admin)/(booth)/boothlist) -->
      <section id="view-boothlist" hidden>
        <div class="min-h-screen bg-stone-50">
          <div class="max-w-300 mx-auto">
            <div class="flex items-center justify-between mx-auto pt-10 pb-4">
              <div class="flex items-center gap-2">
                <input type="text" id="bSearch" oninput="renderBooth()" placeholder="검색어 입력" class="border rounded-sm py-1 px-2 mx-2 bg-white" />
                <select id="bStatus" onchange="bPage=1;renderBooth()" class="border-2 rounded-sm py-1 px-2 mx-2 bg-white hover:bg-gray-100">
                  <option value="">전체 상태</option>
                  <option value="운영 중">운영 중</option>
                  <option value="미운영">미운영</option>
                  <option value="서비스 중단">서비스 중단</option>
                </select>
                <select id="bDevice" onchange="bPage=1;renderBooth()" class="border-2 rounded-sm py-1 px-2 mx-2 bg-white hover:bg-gray-100">
                  <option value="">미할당 장비 선택</option>
                  <option value="pc">미니 PC</option>
                  <option value="monitor">모니터</option>
                  <option value="lte">LTE 라우터</option>
                </select>
                <span onclick="resetBooth()" class="text-gray-500 border-gray-500 border-b border-dashed cursor-pointer">초기화</span>
              </div>
              <div class="flex items-center ml-auto bg-white hover:bg-gray-100">
                <select id="bSize" onchange="bPage=1;renderBooth()" class="border-2 px-1 py-1">
                  <option value="10">10개</option>
                  <option value="20">20개</option>
                  <option value="50">50개</option>
                </select>
              </div>
            </div>
            <div>
              <table class="w-full mx-auto border-b">
                <thead>
                  <tr>
                    <th class="text-left px-4 py-2 border-b">부스 코드</th>
                    <th class="text-left px-4 py-2 border-b">소속 기관명</th>
                    <th class="text-left px-4 py-2 border-b">부스 설치 위치</th>
                    <th class="text-left px-4 py-2 border-b">장비 할당 여부</th>
                    <th class="text-left px-4 py-2 border-b cursor-pointer" onclick="bToggleSort()" id="bSortTh">부스 설치 일자 ▼</th>
                    <th class="text-left px-4 py-2 border-b">부스 상태</th>
                  </tr>
                </thead>
                <tbody id="bBody"></tbody>
              </table>
            </div>
            <div id="bPager" class="flex m-4 justify-center items-center gap-4"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ---------- 데이터 (datas.ts 일부) ----------
    const institutions = [
      { code: '1042-8731-5290-3618', name: '서울마음지원센터', region: '서울', createdAt: '2026-03-01', booths: 1, account: true },
      { code: '2917-4053-8164-7325', name: '늘봄중학교', region: '경기', createdAt: '2026-03-03', booths: 2, account: true },
      { code: '3784-6290-1537-4862', name: '한빛청소년복지관', region: '인천', createdAt: '2026-02-14', booths: 1, account: true },
      { code: '4561-3872-9048-2193', name: '푸른나무재단', region: '서울', createdAt: '2025-11-22', booths: 2, account: false },
      { code: '5438-1904-6273-8057', name: '다온심리상담센터', region: '부산', createdAt: '2026-01-08', booths: 1, account: true },
      { code: '6205-7318-0492-5741', name: '강남구청소년상담복지센터', region: '서울', createdAt: '2025-12-17', booths: 1, account: true },
      { code: '7381-2946-8107-6523', name: '서초여성가족플라자', region: '서울', createdAt: '2026-02-05', booths: 2, account: false },
      { code: '8064-5173-2839-1407', name: '마포구립노인종합복지관', region: '서울', createdAt: '2025-10-30', booths: 1, account: true },
      { code: '9152-6804-7361-2938', name: '은평천사원', region: '서울', createdAt: '2026-01-19', booths: 2, account: true },
      { code: '2593-7410-8025-3186', name: '서울시립청소년미디어센터', region: '서울', createdAt: '2026-03-11', booths: 1, account: true },
      { code: '8506-1927-5684-3012', name: '대구희망복지재단', region: '대구', createdAt: '2025-08-19', booths: 2, account: true },
      { code: '2247-3506-9861-7034', name: '광주마음건강센터', region: '광주', createdAt: '2025-11-11', booths: 1, account: true },
      { code: '5902-4361-7158-2806', name: '구로구정신건강복지센터', region: '서울', createdAt: '2026-03-19', booths: 2, account: true },
      { code: '6179-8024-3597-4163', name: '희망나눔협회', region: '경기', createdAt: '2025-05-11', booths: 1, account: true },
    ]
    const booths = [
      { code: '3821-0174-6593-2047', org: '서울마음지원센터', location: '1층 복도 끝 대기공간', pc: 'P-047', monitor: 'M-023', lte: '미할당', installedAt: '2024-03-15', status: '운영 중' },
      { code: '1492-8830-2761-5038', org: '늘봄중학교', location: '본관 3층 위클래스', pc: 'P-012', monitor: 'M-041', lte: '미할당', installedAt: '2023-09-01', status: '운영 중' },
      { code: '7263-4150-9882-3614', org: '한빛청소년복지관', location: '정문 옆 안내데스크', pc: 'P-088', monitor: 'M-005', lte: '미할당', installedAt: '2025-02-20', status: '운영 중' },
      { code: '5047-2391-1480-7726', org: '푸른나무재단', location: '2층 상담실 앞 복도', pc: 'P-033', monitor: 'M-067', lte: '미할당', installedAt: '2024-11-07', status: '운영 중' },
      { code: '9183-6702-3859-0241', org: '다온심리상담센터', location: '지하 1층 엘리베이터 옆', pc: 'P-061', monitor: 'M-089', lte: '미할당', installedAt: '2023-06-14', status: '미운영' },
      { code: '2574-1063-8427-4915', org: '강남구청소년상담복지센터', location: '로비 우측 안내부스', pc: 'P-019', monitor: 'M-034', lte: 'L-003', installedAt: '2025-01-08', status: '운영 중' },
      { code: '0391-5618-7204-8853', org: '마포구립노인종합복지관', location: '후문 행정동 앞', pc: 'P-042', monitor: 'M-056', lte: '미할당', installedAt: '2023-12-03', status: '서비스 중단' },
      { code: '4762-0935-2148-6307', org: '은평천사원', location: '1층 원무과 입구', pc: '미할당', monitor: 'M-078', lte: '미할당', installedAt: '2026-03-01', status: '미운영' },
    ]
    const regions = ['서울', '부산', '대구', '인천', '광주', '대전', '울산', '세종', '강원', '경기', '경남', '경북', '전남', '전북', '충남', '충북', '제주']

    // ---------- 화면/드롭다운 ----------
    function enterApp(e) { e.preventDefault(); document.getElementById('login').hidden = true; document.getElementById('app').hidden = false; showView('dashboard') }
    function logout() { document.getElementById('app').hidden = true; document.getElementById('login').hidden = false; closeDd() }
    function showView(name) {
      ['dashboard', 'orglist', 'boothlist'].forEach((v) => { document.getElementById('view-' + v).hidden = v !== name })
      closeDd(); window.scrollTo(0, 0)
      if (name === 'orglist') renderOrg()
      if (name === 'boothlist') renderBooth()
    }
    let openMenu = null
    function toggleDd(key) {
      openMenu = openMenu === key ? null : key
      document.querySelectorAll('[data-menu]').forEach((m) => { m.hidden = m.dataset.menu !== openMenu })
      document.querySelectorAll('[data-arrow]').forEach((a) => { a.textContent = a.dataset.arrow === openMenu ? '▲' : '▼' })
    }
    function closeDd() { openMenu = null; document.querySelectorAll('[data-menu]').forEach((m) => (m.hidden = true)); document.querySelectorAll('[data-arrow]').forEach((a) => (a.textContent = '▼')) }
    document.addEventListener('click', (e) => { if (!e.target.closest('.dd')) closeDd() })

    // ---------- 기관 목록 ----------
    let oSort = 'desc', oPage = 1
    document.getElementById('oRegion').innerHTML = '<option value="">전체 지역</option>' + regions.map((r) => `<option value="${r}">${r}</option>`).join('')
    function oToggleSort() { oSort = oSort === 'desc' ? 'asc' : 'desc'; document.getElementById('oSortTh').textContent = '둥록 일자 ' + (oSort === 'desc' ? '▼' : '▲'); renderOrg() }
    function resetOrg() { oSearch.value = ''; oRegion.value = ''; oAccount.value = ''; oSize.value = '10'; oPage = 1; renderOrg() }
    function renderOrg() {
      const q = oSearch.value.trim(), region = oRegion.value, account = oAccount.value, size = +oSize.value
      let rows = institutions.filter((i) => {
        if (region && i.region !== region) return false
        if (account && String(i.account) !== account) return false
        if (q && !i.code.includes(q) && !i.name.includes(q)) return false
        return true
      })
      rows.sort((a, b) => oSort === 'asc' ? new Date(a.createdAt) - new Date(b.createdAt) : new Date(b.createdAt) - new Date(a.createdAt))
      const total = rows.length, totalPage = Math.max(1, Math.ceil(total / size))
      if (oPage > totalPage) oPage = totalPage
      const start = (oPage - 1) * size, pageData = rows.slice(start, start + size)
      document.getElementById('oBody').innerHTML = pageData.map((i) => `
        <tr class="hover:bg-slate-50 cursor-pointer transition-colors">
          <td class="px-5 py-4 text-base font-mono text-slate-600">${i.code}</td>
          <td class="px-5 py-4 text-base font-mono text-slate-600">${i.name}</td>
          <td class="px-5 py-4 text-base font-mono text-slate-600">${i.createdAt}</td>
          <td class="px-5 py-4 text-base font-mono text-slate-600">${i.booths}개</td>
          <td class="px-5 py-4 text-base"><span class="inline-flex items-center px-2.5 py-1 rounded-full text-sm font-medium ${i.account ? 'bg-green-50 text-green-700' : 'bg-slate-100 text-slate-500'}">${i.account ? '있음' : '없음'}</span></td>
          <td class="px-5 py-4 text-base font-mono text-slate-600">${i.region}</td>
        </tr>`).join('')
      document.getElementById('oCount').textContent = `${total}개 중 ${total ? start + 1 : 0}-${Math.min(start + size, total)}`
      let pager = `<button onclick="oPage=1;renderOrg()" class="px-2 py-1 text-base text-slate-600 hover:text-slate-800 ${oPage === 1 ? 'opacity-30' : ''}">${'<<'}</button>`
      for (let n = 1; n <= totalPage; n++) pager += `<button onclick="oPage=${n};renderOrg()" class="px-3 py-1 text-base rounded-md transition-colors ${oPage === n ? 'bg-blue-500 text-white font-medium' : 'hover:bg-slate-100 text-slate-600'}">${n}</button>`
      pager += `<button onclick="oPage=${totalPage};renderOrg()" class="px-2 py-1 text-base text-slate-600 hover:text-slate-800 ${oPage === totalPage ? 'opacity-30' : ''}">${'>>'}</button>`
      document.getElementById('oPager').innerHTML = pager
    }

    // ---------- 부스 목록 ----------
    let bSort = 'desc', bPage = 1
    function bToggleSort() { bSort = bSort === 'desc' ? 'asc' : 'desc'; document.getElementById('bSortTh').textContent = '부스 설치 일자 ' + (bSort === 'desc' ? '▼' : '▲'); renderBooth() }
    function resetBooth() { bSearch.value = ''; bStatus.value = ''; bDevice.value = ''; bSize.value = '10'; bPage = 1; renderBooth() }
    function renderBooth() {
      const q = bSearch.value.trim(), status = bStatus.value, dev = bDevice.value, size = +bSize.value
      let rows = booths.filter((i) => {
        if (status && i.status !== status) return false
        if (dev === 'pc' && i.pc !== '미할당') return false
        if (dev === 'monitor' && i.monitor !== '미할당') return false
        if (dev === 'lte' && i.lte !== '미할당') return false
        if (q && !i.code.includes(q) && !i.org.includes(q)) return false
        return true
      })
      rows.sort((a, b) => bSort === 'asc' ? new Date(a.installedAt) - new Date(b.installedAt) : new Date(b.installedAt) - new Date(a.installedAt))
      const total = rows.length, totalPage = Math.max(1, Math.ceil(total / size))
      if (bPage > totalPage) bPage = totalPage
      const start = (bPage - 1) * size, pageData = rows.slice(start, start + size)
      document.getElementById('bBody').innerHTML = pageData.map((i) => `
        <tr class="cursor-pointer hover:bg-stone-200">
          <td class="px-4 py-3 border-b border-dashed">${i.code}</td>
          <td class="px-4 py-3 border-b border-dashed">${i.org}</td>
          <td class="px-4 py-3 border-b border-dashed">${i.location}</td>
          <td class="px-4 py-3 border-b border-dashed">${i.pc !== '미할당' ? 'P : O' : 'P : X'} | ${i.monitor !== '미할당' ? ' M : O' : ' M : X'} | ${i.lte !== '미할당' ? ' L : O' : ' L : X'}</td>
          <td class="px-4 py-3 border-b border-dashed">${i.installedAt}</td>
          <td class="px-4 py-2 border-b border-dashed">${i.status}</td>
        </tr>`).join('')
      let pager = `<button onclick="bPage=1;renderBooth()">${'<<'}</button>`
      for (let n = 1; n <= totalPage; n++) pager += `<button onclick="bPage=${n};renderBooth()" class="${bPage === n ? 'font-bold px-3 py-1' : 'px-3 py-1'}">${n}</button>`
      pager += `<button onclick="bPage=${totalPage};renderBooth()">${'>>'}</button>`
      document.getElementById('bPager').innerHTML = pager
    }
  </script>
</body>
</html>
